<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Panel de administración | Seravena</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="../assets/isotype-chocolate.png">
<style>
:root{
  --chocolate:#4B412D; --camel:#9D8051; --arena:#EDE2D0; --piedra:#F9F9F8; --pardo:#1A1A1A;
  --white:#fff; --muted:#6b6357; --arena-deep:#e0d4c0;
  --radius:16px; --shadow:0 18px 50px rgba(75,65,45,.14);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--piedra);color:var(--pardo);min-height:100vh;min-height:100svh;display:flex;align-items:center;justify-content:center;padding:24px}
.bg{position:fixed;inset:0;z-index:0;background:radial-gradient(1100px 560px at 72% -12%, var(--arena), var(--piedra) 62%)}
.card,.dash{position:relative;z-index:1;width:100%;background:var(--white);border:1px solid var(--arena-deep);border-radius:var(--radius);box-shadow:var(--shadow)}
.card{max-width:420px;padding:40px 34px}
.brand{text-align:center;margin-bottom:8px}
.brand img{height:34px;width:auto}
.subtitle{text-align:center;color:var(--muted);font-size:.92rem;margin-bottom:28px}
label{display:block;font-size:.82rem;font-weight:600;color:var(--chocolate);margin:0 0 7px 2px}
.field{margin-bottom:18px}
input{width:100%;padding:13px 15px;border:1px solid var(--arena-deep);border-radius:11px;font-family:inherit;font-size:1rem;background:var(--piedra);transition:border-color .2s,box-shadow .2s}
input:focus{outline:none;border-color:var(--camel);box-shadow:0 0 0 3px rgba(157,128,81,.15);background:#fff}
.btn{width:100%;padding:14px;border:none;border-radius:11px;background:var(--chocolate);color:#fff;font-family:inherit;font-size:1rem;font-weight:600;cursor:pointer;transition:background .25s,transform .1s;margin-top:6px}
.btn:hover{background:#3a3322}
.btn:active{transform:translateY(1px)}
.btn:disabled{opacity:.6;cursor:not-allowed}
.msg{margin-top:14px;font-size:.88rem;text-align:center;min-height:1.2em}
.msg.error{color:#b0341d}
.msg.ok{color:#3f6b3f}
.foot{text-align:center;margin-top:22px;font-size:.78rem;color:var(--muted)}
.hidden{display:none!important}
/* Panel */
.dash{max-width:620px;padding:34px 36px 40px}
.dash-top{display:flex;align-items:center;justify-content:space-between;gap:12px;padding-bottom:18px;border-bottom:1px solid var(--arena-deep);margin-bottom:24px;flex-wrap:wrap}
.dash-top img{height:26px}
.dash-user{font-size:.85rem;color:var(--muted);display:flex;align-items:center;gap:14px}
.textbtn{background:none;border:none;color:var(--camel);font-family:inherit;font-size:.85rem;font-weight:600;cursor:pointer;text-decoration:none}
.textbtn:hover{text-decoration:underline}
.dash h1{font-weight:600;font-size:1.35rem;color:var(--chocolate)}
.dash-sub{color:var(--muted);font-size:.95rem;margin:6px 0 26px}
.editor{background:var(--piedra);border:1px solid var(--arena-deep);border-radius:13px;padding:24px 22px}
.editor h2{font-size:1.05rem;color:var(--chocolate);font-weight:600;margin-bottom:18px}
.editor .hint{font-size:.76rem;color:var(--muted);font-weight:400;margin:-4px 0 7px 2px}
.dash-footlink{display:inline-block;margin-top:22px}
</style>
</head>
<body>
<div class="bg"></div>

<!-- ====== LOGIN ====== -->
<div class="card" id="loginCard">
  <div class="brand"><img src="../assets/wordmark-pardo.webp" alt="Seravena"></div>
  <p class="subtitle">Panel de administración</p>
  <form id="loginForm" novalidate>
    <div class="field">
      <label for="email">Correo</label>
      <input type="email" id="email" autocomplete="username" placeholder="tu@correo.com" required>
    </div>
    <div class="field">
      <label for="password">Contraseña</label>
      <input type="password" id="password" autocomplete="current-password" placeholder="••••••••" required>
    </div>
    <button type="submit" class="btn" id="loginBtn">Ingresar</button>
    <p class="msg" id="msg"></p>
  </form>
  <p class="foot">Acceso solo para el equipo de Seravena 🔒</p>
</div>

<!-- ====== PANEL ====== -->
<div class="dash hidden" id="dash">
  <div class="dash-top">
    <img src="../assets/wordmark-pardo.webp" alt="Seravena">
    <div class="dash-user"><span id="whoami">—</span><button class="textbtn" id="logoutBtn">Cerrar sesión</button></div>
  </div>
  <h1>Hola 👋</h1>
  <p class="dash-sub">Lo que cambies aquí se actualiza en tu web <strong>automáticamente</strong>. ✨</p>

  <section class="editor">
    <h2>📞 Datos de contacto</h2>
    <div class="field">
      <label for="f_whatsapp">WhatsApp</label>
      <p class="hint">Tal cual quieres que se vea (ej. +57 305 208 8204).</p>
      <input type="text" id="f_whatsapp" placeholder="+57 305 208 8204">
    </div>
    <div class="field">
      <label for="f_email">Correo</label>
      <input type="email" id="f_email" placeholder="info@seravena.com.co">
    </div>
    <button class="btn" id="saveBtn">Guardar cambios</button>
    <p class="msg" id="saveMsg"></p>
  </section>

  <a href="../index.html" target="_blank" rel="noopener" class="textbtn dash-footlink">Ver mi sitio web ↗</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ===== Configuración de Supabase (anon key = pública/segura) ===== */
const SUPABASE_URL = "https://ppxrwyzqtsvwhyfjwgjg.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBweHJ3eXpxdHN2d2h5Zmp3Z2pnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzMjkxOTEsImV4cCI6MjA5NzkwNTE5MX0.0fi-LnkGmofWEsxTsj9mWVOqgTjZMilEtwzNWtaKEWc";

const { createClient } = window.supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const loginCard = document.getElementById('loginCard');
const dash = document.getElementById('dash');
const msg = document.getElementById('msg');
const loginBtn = document.getElementById('loginBtn');
const saveMsg = document.getElementById('saveMsg');
const saveBtn = document.getElementById('saveBtn');

function showDashboard(user){
  loginCard.classList.add('hidden');
  dash.classList.remove('hidden');
  document.getElementById('whoami').textContent = user?.email || '';
  loadContenido();
}
function showLogin(){
  dash.classList.add('hidden');
  loginCard.classList.remove('hidden');
}

/* ¿Sesión abierta? */
(async () => {
  try { const { data:{ session } } = await sb.auth.getSession(); if (session) showDashboard(session.user); }
  catch (e) {}
})();

/* Login */
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  msg.className = 'msg'; msg.textContent = '';
  loginBtn.disabled = true; loginBtn.textContent = 'Ingresando…';
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  try {
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if (error) { msg.className = 'msg error'; msg.textContent = 'Correo o contraseña incorrectos.'; }
    else { showDashboard(data.user); }
  } catch (err) { msg.className = 'msg error'; msg.textContent = 'El panel aún no está conectado.'; }
  loginBtn.disabled = false; loginBtn.textContent = 'Ingresar';
});

/* Cargar contenido actual */
async function loadContenido(){
  saveMsg.className = 'msg'; saveMsg.textContent = '';
  try {
    const { data, error } = await sb.from('contenido').select('clave,valor');
    if (error) { saveMsg.className = 'msg error'; saveMsg.textContent = 'Aún no está lista la base de datos (avísame para terminarla).'; return; }
    const map = {}; (data||[]).forEach(r => map[r.clave] = r.valor);
    document.getElementById('f_whatsapp').value = map.whatsapp || '';
    document.getElementById('f_email').value = map.email || '';
  } catch (e) {}
}

/* Guardar contenido */
saveBtn.addEventListener('click', async () => {
  saveMsg.className = 'msg'; saveMsg.textContent = '';
  saveBtn.disabled = true; saveBtn.textContent = 'Guardando…';
  const filas = [
    { clave:'whatsapp', valor: document.getElementById('f_whatsapp').value.trim() },
    { clave:'email',    valor: document.getElementById('f_email').value.trim() },
  ];
  try {
    const { error } = await sb.from('contenido').upsert(filas);
    if (error) { saveMsg.className = 'msg error'; saveMsg.textContent = 'No se pudo guardar. Avísame.'; }
    else { saveMsg.className = 'msg ok'; saveMsg.textContent = '✓ Guardado. Tu web se actualizará en un momento.'; }
  } catch (e) { saveMsg.className = 'msg error'; saveMsg.textContent = 'No se pudo guardar. Avísame.'; }
  saveBtn.disabled = false; saveBtn.textContent = 'Guardar cambios';
});

/* Logout */
document.getElementById('logoutBtn').addEventListener('click', async () => {
  try { await sb.auth.signOut(); } catch (e) {}
  showLogin();
});
</script>
</body>
</html>
